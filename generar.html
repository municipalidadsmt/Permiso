<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Permisos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f2f2f2;
}

input{
display:block;
margin-bottom:10px;
padding:8px;
width:250px;
}

button{
padding:10px 20px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

#qrcode{
margin-top:20px;
}

</style>

</head>

<body>

<h2>Generador de Permisos</h2>

<input id="nombre" placeholder="Nombre completo">

<input id="dni" placeholder="DNI">

<input id="permiso" placeholder="Tipo de permiso">

<button onclick="generar()">Generar Permiso</button>

<h3>QR del permiso</h3>

<div id="qrcode"></div>

<script>

function generar(){

let nombre = document.getElementById("nombre").value
let dni = document.getElementById("dni").value
let permiso = document.getElementById("permiso").value

let codigo = Date.now()

let url = "https://municipalidadsmt.github.io/permisos/verificar.html?id=" + codigo

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"), url)

}

</script>

</body>
</html>
