<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permiso de Mudanza</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.estado{
background:#2e7d32;
color:white;
text-align:center;
padding:14px;
border-radius:30px;
font-weight:bold;
font-size:18px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:10px;
padding:18px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.label{
color:#777;
font-size:14px;
}

.value{
font-size:20px;
margin-top:4px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="logo">Permiso de Mudanza</div>
</div>

<div class="estado">
PERMISO VIGENTE
</div>

<div class="card">
<div class="label">Nro. de Solicitud</div>
<div class="value">86</div>
</div>

<div class="card">
<div class="label">Fecha de Solicitud</div>
<div class="value">05/03/2026</div>
</div>

<div class="card">
<div class="label">Solicitante</div>
<div class="value">YA, MUDARTE</div>
</div>

<div class="card">
<div class="label">Empresa</div>
<div class="value">FLETES TUCUMAN</div>
</div>

<div class="card">
<div class="label">Domicilio</div>
<div class="value">CHACABUCO 600</div>
</div>

</div>

</body>
</html>
