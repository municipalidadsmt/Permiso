<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Permisos</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.resultado{
margin-top:20px;
word-break:break-all;
}

</style>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
</head>

<body>

<div class="container">

<h2>Generador de Permisos</h2>

<input id="numero" placeholder="Nro de solicitud">
<input id="fecha" placeholder="Fecha de solicitud">
<input id="solicitante" placeholder="Solicitante">
<input id="empresa" placeholder="Empresa">
<input id="domicilio" placeholder="Domicilio">
<input id="operaciones" placeholder="Cantidad de operaciones">
<input id="dominio" placeholder="Dominio">
<input id="vehiculo" placeholder="Vehiculo">
<input id="mano" placeholder="Mano">
<input id="peso" placeholder="Peso">
<input id="zona" placeholder="Zona">
<input id="desde" placeholder="Fecha desde">
<input id="hasta" placeholder="Fecha hasta">
<input id="horaini" placeholder="Hora desde">
<input id="horafin" placeholder="Hora hasta">
<input id="notas" placeholder="Observaciones">

<button onclick="generar()">Generar Permiso</button>

<div class="resultado" id="resultado"></div>
  
<div id="qrcode" style="margin-top:20px;text-align:center;"></div>
  
</div>

<script>

function generar(){

let numero = document.getElementById("numero").value;
let fecha = document.getElementById("fecha").value;
let solicitante = document.getElementById("solicitante").value;
let empresa = document.getElementById("empresa").value;
let domicilio = document.getElementById("domicilio").value;
let operaciones = document.getElementById("operaciones").value;
let dominio = document.getElementById("dominio").value;
let vehiculo = document.getElementById("vehiculo").value;
let mano = document.getElementById("mano").value;
let peso = document.getElementById("peso").value;
let zona = document.getElementById("zona").value;
let desde = document.getElementById("desde").value;
let hasta = document.getElementById("hasta").value;
let horaini = document.getElementById("horaini").value;
let horafin = document.getElementById("horafin").value;
let notas = document.getElementById("notas").value;

let link =
"https://municipalidadsmt.github.io/Permiso?" +
"numero="+numero+
"&fecha="+fecha+
"&solicitante="+solicitante+
"&empresa="+empresa+
"&domicilio="+domicilio+
"&operaciones="+operaciones+
"&dominio="+dominio+
"&vehiculo="+vehiculo+
"&mano="+mano+
"&peso="+peso+
"&zona="+zona+
"&desde="+desde+
"&hasta="+hasta+
"&horaini="+horaini+
"&horafin="+horafin+
"&notas="+notas;

document.getElementById("resultado").innerHTML =
"<b>Link del permiso:</b><br><a href='"+link+"' target='_blank'>"+link+"</a>";

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
text: link,
width: 200,
height: 200
});
}

</script>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
</script>  
  
</body>
</html>
