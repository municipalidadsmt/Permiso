<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permiso</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;

.container{
    max-width:500px;
    margin:auto;
}

.estado{

    margin-bottom:20px;
}

.card{
    background:#e9e9e9;
    border-radius:8px;
    padding:15px;
    margin-bottom:12px;
}

.titulo{
    color:#777;
    font-size:14px;
}

.valor{
    font-size:20px;
    margin-top:5px;
}
</style>

</head>

<body>

<div class="container">

<div class="estado">
PERMISO VIGENTE
</div>

<div class="card">

</div>

<div class="valor">86</div>
</div>

<div class="card">
<div class="titulo">Fecha de Solicitud</div>
<div class="valor">05/03/2026</div>
</div>

<div class="card">
<div class="titulo">Solicitante</div>
<div class="valor">YA, MUDARTE</div>
</div>

<div class="titulo">Empresa</div>
<div class="valor">FLETES TUCUMAN</div>
</div>

</div>

</div>

</body>
</html>
