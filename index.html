<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<title>Validación de Permisos</title>

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#f2f2f2;
}

/* HEADER */

.header{
background:#1976d2;
color:white;
padding:18px 20px;
font-size:28px;
font-weight:700;
letter-spacing:1px;
}

.header span{
font-weight:400;
font-size:18px;
display:block;
}

/* CONTENIDO */

.container{
max-width:420px;
margin:auto;
padding:25px 15px;
}

/* TITULO */

.titulo{
text-align:center;
font-size:22px;
font-weight:500;
margin-bottom:25px;
}

/* BOTON ESTADO */

.estado{
display:block;
width:220px;
margin:0 auto 25px auto;
background:#2e7d32;
color:white;
text-align:center;
padding:12px;
border-radius:30px;
font-weight:600;
letter-spacing:1px;
}

/* TARJETAS */

.card{
background:#eeeeee;
border-radius:6px;
padding:16px;
margin-bottom:14px;
box-shadow:0 1px 2px rgba(0,0,0,0.1);
}

.label{
color:#6b6b6b;
font-size:15px;
margin-bottom:6px;
}

.value{
font-size:20px;
font-weight:500;
}

</style>
</head>

<body>

<div class="header">

<div class="header-content">

<img src="logo.png" class="logo" height="40">

</div>

</div>

<div class="container">

<div class="titulo">
VALIDACION DE PERMISOS - VIA PUBLICA
</div>

<div class="estado">
PERMISO VIGENTE
</div>

<div class="card">
<div class="label">Permiso</div>
</div>

<div class="card">
<div class="label">Nro. de Solicitud</div>
<div class="value">86</div>
</div>

<div class="card">
<div class="label">Fecha de Solicitud</div>
<div class="value">05/03/2026</div>
</div>

<div class="card">
<div class="label">Solicitante</div>
<div class="value">YA, MUDARTE</div>
</div>

</div>

</body>
</html>
